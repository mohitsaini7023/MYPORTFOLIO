<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#1f2937" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- badge background -->
  <rect x="4" y="4" width="192" height="192" rx="28" fill="#10162a" stroke="#232c47" stroke-width="2"/>
  <rect x="14" y="14" width="172" height="172" rx="20" fill="url(#grid)"/>

  <!-- corner brackets, code-tag motif -->
  <path d="M46 60 L28 78 L46 96" fill="none" stroke="#47c2a8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M154 104 L172 122 L154 140" fill="none" stroke="#47c2a8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- the M mark -->
  <text x="100" y="128" text-anchor="middle" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="700" font-size="92" fill="#e8a33d">M</text>

  <!-- status dot -->
  <circle cx="152" cy="52" r="7" fill="#47c2a8"/>
  <circle cx="152" cy="52" r="12" fill="none" stroke="#47c2a8" stroke-width="1.5" opacity="0.35"/>
</svg>
